name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Using the latest stable Node for 2026

      - name: Install Dependencies
        # We only install the "helper" tools the library needs to run
        run: npm install

      - name: Run Control Script
        env:
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          cat << 'EOF' > run_script.js
          // Since we are INSIDE the library's folder, we point to the local build
          // Note: If 'build' doesn't work, we try 'src'
          const { EufySecurity } = require('./src/index.ts');
          
          async function main() {
              try {
                  const eufy = new EufySecurity({
                      username: process.env.EUFY_EMAIL,
                      password: process.env.EUFY_PASSWORD,
                      country: 'US', // Ensure this matches your account's country!
                  });
                  
                  console.log('Connecting to Eufy Cloud...');
                  await eufy.connect();
                  
                  eufy.on('devices', (devices) => {
                      console.log('✅ Success! Found ' + devices.length + ' devices:');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });

                  setTimeout(() => {
                      console.log('❌ Timeout: Cloud connected but no devices seen. (Check 2FA)');
                      process.exit(1);
                  }, 20000);

              } catch (e) {
                  console.error('❌ Error:', e.message);
                  process.exit(1);
              }
          }
          main();
          EOF
          
          # We use ts-node because the source files are in TypeScript
          npx ts-node --esm --openssl-legacy-provider run_script.js
