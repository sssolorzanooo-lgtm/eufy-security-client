name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup and Install
        run: |
          mkdir eufy-run
          cd eufy-run
          npm init -y
          npm install eufy-security-client@3.8.0 node-fetch@2 --no-save

      - name: Run Control Script
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          cd eufy-run
          cat << 'EOF' > run_script.js
          const { EufySecurity } = require('eufy-security-client');
          
          async function main() {
              const config = {
                  username: process.env.EUFY_EMAIL,
                  password: process.env.EUFY_PASSWORD,
                  country: 'US', 
                  language: 'en',
                  persistentDir: './data',
                  // In 2026, we must explicitly set the storage type to 'local'
                  storageType: 0 
              };

              console.log('Step 1: Initializing Eufy Engine...');
              
              try {
                  // We use the static initializer which handles all the 'undefined' internal objects for us
                  const eufy = await EufySecurity.initialize(config);

                  console.log('Step 2: Connecting to Cloud...');
                  await eufy.connect();

                  eufy.on('devices', (devices) => {
                      console.log('✅ SUCCESS! Connection established.');
                      console.log('Found ' + devices.length + ' devices:');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });

                  // Handle the inevitable 2FA/Handshake wait
                  setTimeout(() => {
                      console.log('❌ Timeout: Cloud connected but no devices returned.');
                      console.log('This is almost always because Eufy sent a 2FA code to your email.');
                      process.exit(1);
                  }, 30000);

              } catch (e) {
                  console.error('❌ Error details:', e.message || e);
                  process.exit(1);
              }
          }
          main();
          EOF
          
          node run_script.js
