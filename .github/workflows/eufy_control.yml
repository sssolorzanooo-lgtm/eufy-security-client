name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup and Install
        run: |
          mkdir eufy-run
          cd eufy-run
          npm init -y
          # Installing the specific version and its dependency
          npm install eufy-security-client@3.8.0 node-fetch@2 --no-save

      - name: Run Control Script
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          cd eufy-run
          cat << 'EOF' > run_script.js
          const { HTTPApi, EufySecurity } = require('eufy-security-client');
          
          async function main() {
              const config = {
                  username: process.env.EUFY_EMAIL,
                  password: process.env.EUFY_PASSWORD,
                  country: 'US', 
                  language: 'en',
                  persistentDir: './data'
              };

              // We manually create the API engine to avoid the 'undefined login' bug
              const api = new HTTPApi(config);

              try {
                  console.log('Step 1: Authenticating directly with Eufy Cloud...');
                  await api.login();
                  console.log('✅ Login Successful!');

                  console.log('Step 2: Fetching Device List...');
                  const devices = await api.getDevices();
                  
                  if (devices && devices.length > 0) {
                      console.log('✅ SUCCESS! Found ' + devices.length + ' devices:');
                      devices.forEach(d => console.log(' - ' + d.device_name + ' (SN: ' + d.device_sn + ')'));
                  } else {
                      console.log('⚠️ Connected, but no devices were found in this account.');
                  }
                  process.exit(0);

              } catch (e) {
                  // This is where we catch the 2FA error if it exists
                  if (e.message && e.message.includes('2FA')) {
                      console.error('❌ LOGIN BLOCKED: Eufy sent a 2FA code to your email/phone.');
                  } else {
                      console.error('❌ Error details:', e.message || e);
                  }
                  process.exit(1);
              }
          }
          main();
          EOF
          
          node run_script.js
