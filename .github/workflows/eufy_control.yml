name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies and Build
        # We install the tools and run the build command to create the 'dist' folder
        run: |
          npm install
          npm run build

      - name: Run Control Script
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          cat << 'EOF' > run_script.js
          // We point to the DIST folder created by the build step above
          const { EufySecurity } = require('./dist/index.js');
          
          async function main() {
              try {
                  const eufy = new EufySecurity({
                      username: process.env.EUFY_EMAIL,
                      password: process.env.EUFY_PASSWORD,
                      country: 'US', 
                  });
                  
                  console.log('Connecting to Eufy Cloud...');
                  await eufy.connect();
                  
                  eufy.on('devices', (devices) => {
                      console.log('✅ Success! Found ' + devices.length + ' devices:');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });

                  setTimeout(() => {
                      console.log('❌ Timeout: Cloud connected but no devices seen. (Check 2FA)');
                      process.exit(1);
                  }, 25000);

              } catch (e) {
                  console.error('❌ Error:', e.message);
                  process.exit(1);
              }
          }
          main();
          EOF
          
          # Standard node execution
          node run_script.js
