name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Eufy Client
        run: npm install eufy-security-client

      - name: Run Control Script
        env:
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          # Create the script in the CURRENT folder
          cat << 'EOF' > run_script.js
          // We point directly to the installed module in node_modules
          const { EufySecurity } = require('./node_modules/eufy-security-client');
          
          async function main() {
              try {
                  const eufy = new EufySecurity({
                      username: process.env.EUFY_EMAIL,
                      password: process.env.EUFY_PASSWORD,
                      country: 'US', 
                  });
                  
                  console.log('Connecting to Eufy...');
                  await eufy.connect();
                  
                  eufy.on('devices', (devices) => {
                      console.log('✅ Successfully connected!');
                      console.log('Found ' + devices.length + ' devices:');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });

                  // Connection timeout
                  setTimeout(() => {
                      console.log('❌ Timeout: Connected but no devices found. Check 2FA/Permissions.');
                      process.exit(1);
                  }, 20000);

              } catch (e) {
                  console.error('❌ Login Error:', e.message);
                  process.exit(1);
              }
          }
          main();
          EOF
          
          # Run it with the legacy flag
          node --openssl-legacy-provider run_script.js
