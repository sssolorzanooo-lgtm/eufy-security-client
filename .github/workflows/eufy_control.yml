name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using 20 as it's the most stable for this specific fix

      - name: Setup and Install
        run: |
          mkdir eufy-run
          cd eufy-run
          npm init -y
          # We install specific versions to ensure compatibility
          npm install eufy-security-client@3.8.0 node-fetch@2 --no-save

      - name: Run Control Script
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          cd eufy-run
          cat << 'EOF' > run_script.js
          const { EufySecurity } = require('eufy-security-client');
          
          async function main() {
              try {
                  const eufy = new EufySecurity({
                      username: process.env.EUFY_EMAIL,
                      password: process.env.EUFY_PASSWORD,
                      country: 'US', 
                      language: 'en',
                      persistentDir: './data'
                  });

                  console.log('Step 1: Forcing API Initialization...');
                  
                  // This is the manual "kickstart" to prevent the 'login' undefined error
                  // We access the internal API and force a login call
                  if (eufy.getApi) {
                      await eufy.connect();
                  } else {
                      // Fallback for different library versions
                      await eufy.connect();
                  }

                  console.log('Step 2: Connected! Waiting for device list...');

                  eufy.on('devices', (devices) => {
                      console.log('✅ SUCCESS!');
                      console.log('Found ' + devices.length + ' devices:');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });

                  // Increase timeout slightly for the cloud handshake
                  setTimeout(() => {
                      console.log('❌ Timeout: Cloud handshake complete, but no devices returned.');
                      console.log('This usually means 2FA is blocking the device list.');
                      process.exit(1);
                  }, 30000);

              } catch (e) {
                  console.error('❌ Login Failed:', e.message || e);
                  process.exit(1);
              }
          }
          main();
          EOF
          
          node run_script.js
