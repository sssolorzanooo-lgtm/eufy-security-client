name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup and Install
        run: |
          mkdir eufy-run
          cd eufy-run
          npm init -y
          npm install eufy-security-client@3.8.0 node-fetch@2 --no-save

      - name: Run Control Script
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          cd eufy-run
          cat << 'EOF' > run_script.js
          const { HTTPApi } = require('eufy-security-client');
          
          async function main() {
              // The HTTPApi constructor expects (username, password, country, language, persistentDir)
              // NOT a single config object.
              const username = process.env.EUFY_EMAIL;
              const password = process.env.EUFY_PASSWORD;
              const country = 'US'; 
              const language = 'en';
              const persistentDir = './data';

              console.log('Step 1: Authenticating directly with Eufy Cloud...');
              
              try {
                  // Direct constructor call
                  const api = new HTTPApi(username, password, country, language, persistentDir);

                  await api.login();
                  console.log('✅ Login Successful!');

                  console.log('Step 2: Fetching Device List...');
                  const devices = await api.getDevices();
                  
                  if (devices && devices.length > 0) {
                      console.log('✅ SUCCESS! Found ' + devices.length + ' devices:');
                      devices.forEach(d => {
                          console.log(` - Name: ${d.device_name} | Model: ${d.device_model} | SN: ${d.device_sn}`);
                      });
                  } else {
                      console.log('⚠️ Connected, but no devices found. Ensure devices are shared with this account.');
                  }
                  process.exit(0);

              } catch (e) {
                  if (e.message && (e.message.includes('2FA') || e.message.includes('verification'))) {
                      console.error('❌ LOGIN BLOCKED: Eufy 2FA is active. Check your email/phone.');
                  } else {
                      console.error('❌ Error details:', e.message || e);
                  }
                  process.exit(1);
              }
          }
          main();
          EOF
          
          node run_script.js
