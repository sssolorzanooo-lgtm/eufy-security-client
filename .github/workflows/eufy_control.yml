name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Clean Room and Install
        run: |
          mkdir runner-folder
          cd runner-folder
          npm init -y
          npm install eufy-security-client --no-save

      - name: Run Control Script
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          cd runner-folder
          cat << 'EOF' > run_script.js
          const { EufySecurity } = require('eufy-security-client');
          
          async function main() {
              try {
                  const eufy = new EufySecurity({
                      username: process.env.EUFY_EMAIL,
                      password: process.env.EUFY_PASSWORD,
                      country: 'US', 
                      language: 'en',
                      persistentDir: './data'
                  });
                  
                  console.log('Connecting to Eufy Cloud...');
                  await eufy.connect();
                  
                  eufy.on('devices', (devices) => {
                      console.log('✅ Success! Found ' + devices.length + ' devices:');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });

                  setTimeout(() => {
                      console.log('❌ Timeout: No devices reported. Check for a 2FA email/text!');
                      process.exit(1);
                  }, 25000);

              } catch (e) {
                  console.error('❌ Error:', e.message);
                  process.exit(1);
              }
          }
          main();
          EOF
          
          node run_script.js
