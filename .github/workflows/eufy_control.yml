name: Manual Eufy Control

on:
  workflow_dispatch:
    inputs:
      tfa_code:
        description: 'Enter 6-digit 2FA Code'
        required: false

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # THIS STEP REMEMBERS YOUR LOGIN
      - name: Restore Eufy Session
        uses: actions/cache@v4
        with:
          path: eufy-run/data
          key: eufy-session-${{ github.run_id }}
          restore-keys: |
            eufy-session-

      - name: Setup and Install
        run: |
          mkdir -p eufy-run/data
          cd eufy-run
          npm init -y
          npm install eufy-security-client@3.8.0 node-fetch@2 --no-save

      - name: Run Control Script
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
          TFA_INPUT: ${{ github.event.inputs.tfa_code }}
        run: |
          cd eufy-run
          cat << 'EOF' > run_script.js
          const { EufySecurity } = require('eufy-security-client');
          
          async function main() {
              const config = {
                  username: process.env.EUFY_EMAIL,
                  password: process.env.EUFY_PASSWORD,
                  country: 'US',
                  persistentDir: './data' // This folder is what we are caching
              };

              try {
                  const eufy = await EufySecurity.initialize(config);
                  const inputCode = process.env.TFA_INPUT;

                  eufy.on('tfa_requested', () => {
                      if (!inputCode) {
                          console.log('⚠️ ACTION REQUIRED: Check email for code, then Run Workflow again with the code.');
                          process.exit(0); 
                      } else {
                          console.log('Submitting 2FA Code...');
                          // We don't call connect again, we pass it to the pending request
                      }
                  });

                  eufy.on('devices', (devices) => {
                      console.log('✅ SUCCESS! Found ' + devices.length + ' devices.');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });

                  console.log('Attempting Connection...');
                  // If inputCode exists, we try to connect with it immediately
                  await eufy.connect(inputCode || undefined);

                  setTimeout(() => {
                      console.log('❌ Timeout: No response. Try triggering a fresh code.');
                      process.exit(1);
                  }, 40000);

              } catch (e) {
                  console.error('❌ Error:', e.message);
                  process.exit(1);
              }
          }
          main();
          EOF
          
          node run_script.js
