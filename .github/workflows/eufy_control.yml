name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Run Control Script
        env:
          # This tells Node 22 to allow Eufy's older security style
          NODE_OPTIONS: "--openssl-legacy-provider"
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          cat << 'EOF' > run_script.ts
          import { EufySecurity } from './src/index';
          
          async function main() {
              try {
                  const eufy = new EufySecurity({
                      username: process.env.EUFY_EMAIL!,
                      password: process.env.EUFY_PASSWORD!,
                      country: 'US', 
                  });
                  
                  console.log('Connecting to Eufy Cloud...');
                  await eufy.connect();
                  
                  eufy.on('devices', (devices: any[]) => {
                      console.log('✅ Success! Found ' + devices.length + ' devices:');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });

                  setTimeout(() => {
                      console.log('❌ Timeout: Cloud connected but no devices seen. (Likely 2FA)');
                      process.exit(1);
                  }, 20000);

              } catch (e: any) {
                  console.error('❌ Error:', e.message);
                  process.exit(1);
              }
          }
          main();
          EOF
          
          # We use npx ts-node WITHOUT the flags that caused the error
          npx ts-node --esm run_script.ts
