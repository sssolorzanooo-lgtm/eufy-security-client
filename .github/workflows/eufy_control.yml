name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 is required for Eufy Client 3.8.0+
          node-version: '22'

      - name: Install Eufy Client
        run: npm install eufy-security-client

      - name: Run Control Script
        env:
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          echo "const { EufySecurity } = require('eufy-security-client');
          async function main() {
              try {
                  const eufy = new EufySecurity({
                      username: process.env.EUFY_EMAIL,
                      password: process.env.EUFY_PASSWORD,
                      country: 'US', // Set to your country code (US, GB, DE, etc.)
                  });
                  console.log('Connecting to Eufy...');
                  await eufy.connect();
                  
                  eufy.on('devices', (devices) => {
                      console.log('Successfully connected!');
                      console.log('Found ' + devices.length + ' devices.');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });
              } catch (e) {
                  console.error('Script Error:', e.message);
                  process.exit(1);
              }
              setTimeout(() => { 
                  console.log('Timeout: Connection took too long.'); 
                  process.exit(1); 
              }, 30000);
          }
          main();" > run_script.js
          
          # Use legacy provider for Eufy encryption compatibility
          node --openssl-legacy-provider run_script.js
