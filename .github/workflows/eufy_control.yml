name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Eufy Client
        # We use --no-save to keep the installation clean and fast
        run: npm install eufy-security-client --no-save

      - name: Run Control Script
        env:
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          cat << 'EOF' > run_script.js
          const { EufySecurity } = require('eufy-security-client');
          
          async function main() {
              const config = {
                  username: process.env.EUFY_EMAIL,
                  password: process.env.EUFY_PASSWORD,
                  country: 'US',
                  language: 'en',
                  persistentDir: './data', // Prevents internal 'login' undefined errors
              };

              console.log('Connecting to Eufy Cloud...');
              const eufy = new EufySecurity(config);

              try {
                  // Connect returns a promise; we wait for it
                  await eufy.connect();
                  
                  eufy.on('devices', (devices) => {
                      console.log('✅ Connection Success!');
                      console.log('Found ' + devices.length + ' devices:');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });

                  // If after 20 seconds we still have no devices, report it
                  setTimeout(() => {
                      console.log('❌ Connection active but no devices reported. This is usually a 2FA or permission issue.');
                      process.exit(1);
                  }, 20000);

              } catch (err) {
                  console.error('❌ Login Failed:', err.message);
                  process.exit(1);
              }
          }

          main();
          EOF
          
          node --openssl-legacy-provider run_script.js
