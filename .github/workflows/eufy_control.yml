name: Manual Eufy Control

on:
  workflow_dispatch:
    inputs:
      tfa_code:
        description: 'Enter 6-digit 2FA Code (Leave blank for first run to trigger email)'
        required: false
        default: ''

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup and Install
        run: |
          mkdir eufy-run
          cd eufy-run
          npm init -y
          npm install eufy-security-client@3.8.0 node-fetch@2 --no-save

      - name: Run Control Script
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
          TFA_INPUT: ${{ github.event.inputs.tfa_code }}
        run: |
          cd eufy-run
          cat << 'EOF' > run_script.js
          const { EufySecurity } = require('eufy-security-client');
          
          async function main() {
              const config = {
                  username: process.env.EUFY_EMAIL,
                  password: process.env.EUFY_PASSWORD,
                  country: 'US',
                  persistentDir: './data'
              };

              try {
                  const eufy = await EufySecurity.initialize(config);
                  const inputCode = process.env.TFA_INPUT;

                  // This listener catches the "Challenge" from Eufy
                  eufy.on('tfa_requested', () => {
                      if (!inputCode) {
                          console.log('⚠️ 2FA REQUIRED: Eufy just sent a code to your email/phone.');
                          console.log('>>> STOP: Check your email, then run this again and PASTE the code in the box.');
                          process.exit(0); 
                      } else {
                          console.log('Submiting 2FA Code: ' + inputCode);
                          eufy.connect(inputCode);
                      }
                  });

                  eufy.on('devices', (devices) => {
                      console.log('✅ SUCCESS! Connection established.');
                      console.log('Found ' + devices.length + ' devices:');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });

                  console.log('Connecting to Eufy...');
                  await eufy.connect();

                  setTimeout(() => {
                      console.log('❌ Timeout: Did not receive device list. If you entered a code, it may have expired.');
                      process.exit(1);
                  }, 30000);

              } catch (e) {
                  console.error('❌ Error:', e.message);
                  process.exit(1);
              }
          }
          main();
          EOF
          
          node run_script.js
