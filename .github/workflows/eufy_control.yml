name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Using 20.11.0 specifically as it's the most stable for Eufy
          node-version: '20.11.0'

      - name: Install Eufy Client
        # Adding --legacy-peer-deps to ignore version conflicts
        run: npm install eufy-security-client --legacy-peer-deps

      - name: Run Control Script
        env:
          # Re-enables older encryption needed for Eufy cameras
          NODE_OPTIONS: "--openssl-legacy-provider --security-revert=CVE-2023-46809"
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          echo "const { EufySecurity } = require('eufy-security-client');
          async function main() {
              try {
                  const eufy = new EufySecurity({
                      username: process.env.EUFY_EMAIL,
                      password: process.env.EUFY_PASSWORD,
                      country: 'US',
                  });
                  console.log('Connecting to Eufy...');
                  await eufy.connect();
                  console.log('Successfully connected!');
                  
                  eufy.on('devices', (devices) => {
                      console.log('Found ' + devices.length + ' devices.');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });
              } catch (e) {
                  console.error('Script Error:', e.message);
                  process.exit(1);
              }
              setTimeout(() => { console.log('Timeout waiting for devices.'); process.exit(1); }, 30000);
          }
          main();" > run_script.js
          node run_script.js
