name: Manual Eufy Control

on:
  workflow_dispatch:

jobs:
  run-eufy-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Eufy Client
        # This installs the library into a fresh node_modules folder
        run: npm install eufy-security-client

      - name: Run Control Script
        env:
          EUFY_EMAIL: ${{ secrets.EUFY_EMAIL }}
          EUFY_PASSWORD: ${{ secrets.EUFY_PASSWORD }}
        run: |
          # We create the script in a temporary location to avoid folder conflicts
          cat << 'EOF' > ../my_temp_script.js
          const { EufySecurity } = require('eufy-security-client');
          
          async function main() {
              try {
                  const eufy = new EufySecurity({
                      username: process.env.EUFY_EMAIL,
                      password: process.env.EUFY_PASSWORD,
                      country: 'US', 
                  });
                  
                  console.log('Connecting to Eufy...');
                  await eufy.connect();
                  
                  eufy.on('devices', (devices) => {
                      console.log('Successfully connected!');
                      console.log('Found ' + devices.length + ' devices.');
                      devices.forEach(d => console.log(' - ' + d.getName()));
                      process.exit(0);
                  });

                  // If no devices found after 15 seconds, something is wrong
                  setTimeout(() => {
                      console.log('Timeout: Connected to cloud but no devices reported.');
                      process.exit(1);
                  }, 15000);

              } catch (e) {
                  console.error('Login Error:', e.message);
                  process.exit(1);
              }
          }
          main();
          EOF
          
          # Run the script using the legacy provider flag
          node --openssl-legacy-provider ../my_temp_script.js
